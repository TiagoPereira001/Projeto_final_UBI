version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64 # necessário em Macs Apple Silicon (M1/M2/M3/M4), o SQL Server não tem imagem nativa ARM
    container_name: dr_oficina_sql
    restart: always
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD} # vem do .env na raiz do projeto, nunca escrever aqui diretamente
    ports:
      - "1433:1433"
    volumes:
      - sql_dados:/var/opt/mssql

volumes:
  sql_dados: